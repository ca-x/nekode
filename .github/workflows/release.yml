name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: czyt/nekode

jobs:
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build server and daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          COMMIT: ${{ github.sha }}
          SKIP_NPM_INSTALL: "0"
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/nekode-${{ matrix.target }}"
          mkdir -p "$out_dir"
          DAEMON_OUTPUT="$out_dir/nekode-daemon${{ matrix.ext }}" ./build.sh "$out_dir/nekode${{ matrix.ext }}"

      - name: Package artifacts
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/nekode-${{ matrix.target }}"
          version="${GITHUB_REF_NAME:-dev}"
          if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
            version="dev"
          fi
          server_name="nekode_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          daemon_name="nekode-daemon_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          package_root="$RUNNER_TEMP/package"
          mkdir -p "$package_root/$server_name" "$package_root/$daemon_name"
          cp "$out_dir/nekode${{ matrix.ext }}" "$package_root/$server_name/"
          cp "$out_dir/nekode-daemon${{ matrix.ext }}" "$package_root/$daemon_name/"
          cp README.md LICENSE "$package_root/$server_name/"
          cp README.md LICENSE "$package_root/$daemon_name/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd "$package_root" && python3 -m zipfile -c "$RUNNER_TEMP/$server_name.zip" "$server_name")
            (cd "$package_root" && python3 -m zipfile -c "$RUNNER_TEMP/$daemon_name.zip" "$daemon_name")
          else
            tar -czf "$RUNNER_TEMP/$server_name.tar.gz" -C "$package_root" "$server_name"
            tar -czf "$RUNNER_TEMP/$daemon_name.tar.gz" -C "$package_root" "$daemon_name"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekode-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/nekode_*_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
            ${{ runner.temp }}/nekode-daemon_*_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: binaries
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts
          pattern: nekode-*
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
          shopt -s nullglob
          assets=("$RUNNER_TEMP"/artifacts/*.tar.gz "$RUNNER_TEMP"/artifacts/*.zip)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi
          (
            cd "$RUNNER_TEMP/artifacts"
            checksum_assets=(*.tar.gz *.zip)
            sha256sum "${checksum_assets[@]}" > SHA256SUMS.txt
          )
          gh release upload "$tag" "${assets[@]}" --clobber
          gh release upload "$tag" "$RUNNER_TEMP/artifacts/SHA256SUMS.txt" --clobber

  docker:
    name: Publish server Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        if: github.ref_type == 'tag'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Docker Hub publish requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets." >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref_type != 'tag' }}
            type=sha,format=long
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}

      - name: Compute build metadata
        id: buildmeta
        run: echo "build_time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and publish server image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ github.ref_type == 'tag' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.ref_type == 'tag' }}
          load: ${{ github.ref_type != 'tag' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.buildmeta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify server image
        if: github.ref_type != 'tag'
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /app/nekode ${{ env.DOCKERHUB_IMAGE }}:dev version

      - name: Inspect published image
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          docker buildx imagetools inspect ${{ env.DOCKERHUB_IMAGE }}:${{ github.ref_name }}
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
