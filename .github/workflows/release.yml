name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: linux-arm64
            goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build server and daemon
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          COMMIT: ${{ github.sha }}
          SKIP_NPM_INSTALL: "0"
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/nekode-${{ matrix.target }}"
          mkdir -p "$out_dir"
          DAEMON_OUTPUT="$out_dir/nekode-daemon${{ matrix.ext }}" ./build.sh "$out_dir/nekode${{ matrix.ext }}"

      - name: Package artifacts
        run: |
          set -euo pipefail
          out_dir="$RUNNER_TEMP/nekode-${{ matrix.target }}"
          version="${GITHUB_REF_NAME:-dev}"
          if [ "${GITHUB_REF_TYPE:-}" != "tag" ]; then
            version="dev"
          fi
          server_name="nekode_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          daemon_name="nekode-daemon_${version}_${{ matrix.goos }}_${{ matrix.goarch }}"
          package_root="$RUNNER_TEMP/package"
          mkdir -p "$package_root/$server_name" "$package_root/$daemon_name"
          cp "$out_dir/nekode${{ matrix.ext }}" "$package_root/$server_name/"
          cp "$out_dir/nekode-daemon${{ matrix.ext }}" "$package_root/$daemon_name/"
          cp README.md LICENSE "$package_root/$server_name/"
          cp README.md LICENSE "$package_root/$daemon_name/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd "$package_root" && python3 -m zipfile -c "$RUNNER_TEMP/$server_name.zip" "$server_name")
            (cd "$package_root" && python3 -m zipfile -c "$RUNNER_TEMP/$daemon_name.zip" "$daemon_name")
          else
            tar -czf "$RUNNER_TEMP/$server_name.tar.gz" -C "$package_root" "$server_name"
            tar -czf "$RUNNER_TEMP/$daemon_name.tar.gz" -C "$package_root" "$daemon_name"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nekode-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/nekode_*_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
            ${{ runner.temp }}/nekode-daemon_*_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  github-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: binaries
    if: github.ref_type == 'tag'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/artifacts
          pattern: nekode-*
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --generate-notes
          shopt -s nullglob
          assets=("$RUNNER_TEMP"/artifacts/*.tar.gz "$RUNNER_TEMP"/artifacts/*.zip)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi
          (
            cd "$RUNNER_TEMP/artifacts"
            checksum_assets=(*.tar.gz *.zip)
            sha256sum "${checksum_assets[@]}" > SHA256SUMS.txt
          )
          gh release upload "$tag" "${assets[@]}" --clobber
          gh release upload "$tag" "$RUNNER_TEMP/artifacts/SHA256SUMS.txt" --clobber

  docker:
    name: Build server Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: nekode:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            COMMIT=${{ github.sha }}

      - name: Verify server image
        run: |
          set -euo pipefail
          docker run --rm --entrypoint /app/nekode nekode:${{ github.sha }} version
