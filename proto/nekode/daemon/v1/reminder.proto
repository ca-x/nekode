syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/common.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

message ReminderRecord {
  reserved 1000 to 1999;
  reserved 13, 14;
  reserved "fire_time_unix", "fired_time_unix";

  string reminder_id = 1;
  string target = 2;
  string schedule_kind = 3;
  string schedule = 4;
  string prompt = 5;
  bool enabled = 6;
  int64 next_run_unix = 7;
  int64 last_run_unix = 8;
  uint32 run_count = 9;
  string last_error = 10;
  string title = 11;
  string status = 12;
  string msg_ref = 15;
  ReminderRecurrence recurrence = 16;
  string cancel_token = 17;
}
message ReminderRecurrence {
  reserved 1000 to 1999;

  string rule = 1;
  string description = 2;
  string timezone = 3;
}
message ReminderSchedule {
  reserved 1000 to 1999;

  string kind = 1; // cron | every | at | rrule | natural
  string expression = 2;
  string timezone = 3;
}
message ReminderEvent {
  reserved 1000 to 1999;

  string event_id = 1;
  string reminder_id = 2;
  string event_type = 3;
  string actor_type = 4;
  string actor_id = 5;
  int64 occurred_time_unix = 6;
  int64 next_fire_time_unix = 7;
  string detail = 8;
}
message ScheduleReminderRequest {
  reserved 3, 4, 11;
  reserved "schedule_kind", "schedule", "repeat";

  string target = 1;
  string name = 2;
  string prompt = 5;
  repeated string skills = 6;
  string request_id = 7;
  string title = 8;
  oneof schedule_spec {
    uint32 delay_seconds = 9;
    string fire_at = 10;
    ReminderSchedule recurring = 17;
  }
  string timezone = 12;
  string channel = 13;
  string msg_id = 14;
  string idempotency_key = 15;
  RequestContext context = 16;
}
message ScheduleReminderResponse {
  ReminderRecord reminder = 1;
}
message ListRemindersRequest {
  string target = 1;
  uint32 limit = 2;
  repeated string statuses = 3;
  bool include_canceled = 4;
  EventCursor cursor = 5;
}
message ListRemindersResponse {
  repeated ReminderRecord reminders = 1;
  EventCursor next_cursor = 2;
}
message CancelReminderRequest {
  string reminder_id = 1;
  string request_id = 2;
  string idempotency_key = 3;
  RequestContext context = 4;
  string cancel_token = 5;
}
message CancelReminderResponse {
  bool accepted = 1;
  ReminderRecord reminder = 2;
}
message SnoozeReminderRequest {
  string reminder_id = 1;
  uint32 delay_seconds = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}
message SnoozeReminderResponse {
  ReminderRecord reminder = 1;
}
message UpdateReminderRequest {
  reserved 5;
  reserved "repeat";

  string reminder_id = 1;
  optional string title = 2;
  oneof schedule_update {
    string fire_at = 3;
    uint32 delay_seconds = 4;
    ReminderSchedule recurring = 10;
  }
  optional string timezone = 6;
  string request_id = 7;
  string idempotency_key = 8;
  RequestContext context = 9;
}
message UpdateReminderResponse {
  ReminderRecord reminder = 1;
}
message GetReminderLogRequest {
  reserved 2;
  reserved "request_id";

  string reminder_id = 1;
}
message GetReminderLogResponse {
  repeated ReminderEvent events = 1;
}
