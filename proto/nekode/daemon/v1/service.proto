syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/activity.proto";
import "nekode/daemon/v1/agent.proto";
import "nekode/daemon/v1/attachment.proto";
import "nekode/daemon/v1/collaboration.proto";
import "nekode/daemon/v1/common.proto";
import "nekode/daemon/v1/coordination.proto";
import "nekode/daemon/v1/memory.proto";
import "nekode/daemon/v1/reminder.proto";
import "nekode/daemon/v1/runtime.proto";
import "nekode/daemon/v1/task.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

message GetServerInfoRequest {}

message GetServerInfoResponse {
  string server_name = 1;
  string version = 2;
  repeated ChannelRecord channels = 3;
  repeated AgentProfile agents = 4;
  repeated InteractionEndpoint interaction_endpoints = 5;
}

message SubscribeServerEventsRequest {
  string daemon_id = 1;
  string computer_id = 2;
  repeated string agent_ids = 3;
  EventCursor cursor = 4;
  repeated string targets = 5;
  string request_id = 6;
}

message ServerEvent {
  reserved 1000 to 1999;

  string event_id = 1;
  int64 sequence = 2;
  string aggregate_id = 3;
  string target = 4;
  string kind = 5; // run_assigned | agent_control | message | task | reminder | activity | mcp_resource | ping
  int64 created_time_unix = 6;
  int32 protocol_version = 7;
  string request_id = 8;

  oneof payload {
    Run run = 20;
    AgentControlOperation agent_control = 21;
    CollaborationMessage message = 22;
    Task task = 23;
    ReminderRecord reminder = 24;
    ActivityRecord activity = 25;
    McpResourceUpdate mcp_resource_update = 26;
  }
}

message SubscribeServerEventsResponse {
  ServerEvent event = 1;
}

message SubscribeActivityResponse {
  CollaborationEvent event = 1;
}

service DaemonControlService {
  rpc RegisterComputer(RegisterComputerRequest) returns (RegisterComputerResponse);
  rpc HeartbeatComputer(HeartbeatComputerRequest) returns (HeartbeatComputerResponse);
  rpc FetchAssignedRuns(FetchAssignedRunsRequest) returns (FetchAssignedRunsResponse);
  rpc UpdateRunStatus(UpdateRunStatusRequest) returns (UpdateRunStatusResponse);
  rpc AppendRunStep(AppendRunStepRequest) returns (AppendRunStepResponse);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);
  rpc ListWorkspaceTree(ListWorkspaceTreeRequest) returns (ListWorkspaceTreeResponse);
  rpc ReadWorkspaceFile(ReadWorkspaceFileRequest) returns (ReadWorkspaceFileResponse);
  rpc ListChannels(ListChannelsRequest) returns (ListChannelsResponse);
  rpc ListInteractionEndpoints(ListInteractionEndpointsRequest) returns (ListInteractionEndpointsResponse);
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);
  rpc ReadMessages(ReadMessagesRequest) returns (ReadMessagesResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc SaveMessage(SaveMessageRequest) returns (SaveMessageResponse);
  rpc UnsaveMessage(UnsaveMessageRequest) returns (UnsaveMessageResponse);
  rpc ListSavedMessages(ListSavedMessagesRequest) returns (ListSavedMessagesResponse);
  rpc FollowThread(FollowThreadRequest) returns (FollowThreadResponse);
  rpc UnfollowThread(UnfollowThreadRequest) returns (UnfollowThreadResponse);
  rpc CreateCollaborationTask(CreateCollaborationTaskRequest) returns (CreateCollaborationTaskResponse);
  rpc ListCollaborationTasks(ListCollaborationTasksRequest) returns (ListCollaborationTasksResponse);
  rpc ListTaskBoard(ListTaskBoardRequest) returns (ListTaskBoardResponse);
  rpc ClaimCollaborationTask(ClaimCollaborationTaskRequest) returns (ClaimCollaborationTaskResponse);
  rpc ProposeTaskSplit(ProposeTaskSplitRequest) returns (ProposeTaskSplitResponse);
  rpc ApplyTaskSplit(ApplyTaskSplitRequest) returns (ApplyTaskSplitResponse);
  rpc CreateTaskGraph(CreateTaskGraphRequest) returns (CreateTaskGraphResponse);
  rpc ListTaskGraph(ListTaskGraphRequest) returns (ListTaskGraphResponse);
  rpc UpdateTaskGraph(UpdateTaskGraphRequest) returns (UpdateTaskGraphResponse);
  rpc RenewTaskClaimLease(RenewTaskClaimLeaseRequest) returns (RenewTaskClaimLeaseResponse);
  rpc ReleaseTask(ReleaseTaskRequest) returns (ReleaseTaskResponse);
  rpc GetServerInfo(GetServerInfoRequest) returns (GetServerInfoResponse);
  rpc PublishCoordinationRecord(PublishCoordinationRecordRequest) returns (PublishCoordinationRecordResponse);
  rpc ListCoordinationRecords(ListCoordinationRecordsRequest) returns (ListCoordinationRecordsResponse);
  rpc CounterProposeNegotiation(CounterProposeNegotiationRequest) returns (CounterProposeNegotiationResponse);
  rpc ListAgentMemory(ListAgentMemoryRequest) returns (ListAgentMemoryResponse);
  rpc UpsertAgentMemory(UpsertAgentMemoryRequest) returns (UpsertAgentMemoryResponse);
  rpc GetAgentProfile(GetAgentProfileRequest) returns (GetAgentProfileResponse);
  rpc UpdateAgentProfile(UpdateAgentProfileRequest) returns (UpdateAgentProfileResponse);
  rpc SetAgentEnv(SetAgentEnvRequest) returns (SetAgentEnvResponse);
  rpc ListAgentProfiles(ListAgentProfilesRequest) returns (ListAgentProfilesResponse);
  rpc ListAgentDMs(ListAgentDMsRequest) returns (ListAgentDMsResponse);
  rpc ControlAgent(ControlAgentRequest) returns (ControlAgentResponse);
  rpc SendAgentDirectMessage(SendAgentDirectMessageRequest) returns (SendAgentDirectMessageResponse);
  rpc UpdateAgentStatus(UpdateAgentStatusRequest) returns (UpdateAgentStatusResponse);
  rpc ListAgentStatuses(ListAgentStatusesRequest) returns (ListAgentStatusesResponse);
  rpc ScheduleReminder(ScheduleReminderRequest) returns (ScheduleReminderResponse);
  rpc ListReminders(ListRemindersRequest) returns (ListRemindersResponse);
  rpc CancelReminder(CancelReminderRequest) returns (CancelReminderResponse);
  rpc SnoozeReminder(SnoozeReminderRequest) returns (SnoozeReminderResponse);
  rpc UpdateReminder(UpdateReminderRequest) returns (UpdateReminderResponse);
  rpc GetReminderLog(GetReminderLogRequest) returns (GetReminderLogResponse);
  rpc UploadAttachment(UploadAttachmentRequest) returns (UploadAttachmentResponse);
  rpc GetAttachment(GetAttachmentRequest) returns (GetAttachmentResponse);
  rpc ListOutboundDeliveries(ListOutboundDeliveriesRequest) returns (ListOutboundDeliveriesResponse);
  rpc RetryOutboundDelivery(RetryOutboundDeliveryRequest) returns (RetryOutboundDeliveryResponse);
  rpc LogActivity(LogActivityRequest) returns (LogActivityResponse);
  rpc ListActivity(ListActivityRequest) returns (ListActivityResponse);
  rpc ListEventsSince(ListEventsSinceRequest) returns (ListEventsSinceResponse);
  rpc SubscribeServerEvents(SubscribeServerEventsRequest) returns (stream SubscribeServerEventsResponse);
  rpc SubscribeActivity(SubscribeActivityRequest) returns (stream SubscribeActivityResponse);
  rpc SubscribeMcpResource(SubscribeMcpResourceRequest) returns (SubscribeMcpResourceResponse);
  rpc ListMcpResourceUpdates(ListMcpResourceUpdatesRequest) returns (ListMcpResourceUpdatesResponse);
}
