syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/agent.proto";
import "nekode/daemon/v1/common.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

// ComputerStatus is the closed lifecycle for a registered daemon host.
// UNSPECIFIED is for omitted heartbeat state and legacy records.
enum ComputerStatus {
  // Status was not reported.
  COMPUTER_STATUS_UNSPECIFIED = 0;
  // Computer is connected and healthy.
  COMPUTER_STATUS_ONLINE = 1;
  // Computer has missed recent heartbeats but is not fully expired.
  COMPUTER_STATUS_STALE = 2;
  // Computer is disconnected or lease-expired.
  COMPUTER_STATUS_OFFLINE = 3;
  // Computer is connected but reports degraded capabilities.
  COMPUTER_STATUS_DEGRADED = 4;
}

// RunState is the closed lifecycle for an assigned agent run.
enum RunState {
  // Run state is unknown; should not be stored for new runs.
  RUN_STATE_UNSPECIFIED = 0;
  // Run is assigned but not yet started by a daemon.
  RUN_STATE_QUEUED = 1;
  // Run is actively executing.
  RUN_STATE_RUNNING = 2;
  // Run is waiting on an external blocker.
  RUN_STATE_BLOCKED = 3;
  // Run completed successfully.
  RUN_STATE_COMPLETED = 4;
  // Run failed.
  RUN_STATE_FAILED = 5;
  // Run was canceled before completion.
  RUN_STATE_CANCELED = 6;
}

// RunStepKind is the closed taxonomy for built-in run-step records.
// Use RUN_STEP_KIND_CUSTOM when the detail field carries implementation-specific text.
enum RunStepKind {
  // Step kind is not known.
  RUN_STEP_KIND_UNSPECIFIED = 0;
  // Agent started or resumed a run.
  RUN_STEP_KIND_START = 1;
  // Agent read context or loaded memory.
  RUN_STEP_KIND_CONTEXT = 2;
  // Agent invoked a tool.
  RUN_STEP_KIND_TOOL = 3;
  // Agent executed a shell command.
  RUN_STEP_KIND_COMMAND = 4;
  // Agent ran tests or verification.
  RUN_STEP_KIND_TEST = 5;
  // Agent wrote a progress update.
  RUN_STEP_KIND_PROGRESS = 6;
  // Agent produced a final result.
  RUN_STEP_KIND_RESULT = 7;
  // Implementation-specific step.
  RUN_STEP_KIND_CUSTOM = 8;
}

// RunStepStatus is the closed status set for a run step.
enum RunStepStatus {
  // Status is not known.
  RUN_STEP_STATUS_UNSPECIFIED = 0;
  // Step is currently executing.
  RUN_STEP_STATUS_RUNNING = 1;
  // Step completed successfully.
  RUN_STEP_STATUS_COMPLETED = 2;
  // Step failed.
  RUN_STEP_STATUS_FAILED = 3;
  // Step was skipped.
  RUN_STEP_STATUS_SKIPPED = 4;
}

// McpResourceSubscriptionStatus is the closed lifecycle for MCP resource watches.
enum McpResourceSubscriptionStatus {
  // Subscription status is not known.
  MCP_RESOURCE_SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
  // Subscription is active.
  MCP_RESOURCE_SUBSCRIPTION_STATUS_ACTIVE = 1;
  // Subscription is paused but may resume.
  MCP_RESOURCE_SUBSCRIPTION_STATUS_PAUSED = 2;
  // Subscription was canceled.
  MCP_RESOURCE_SUBSCRIPTION_STATUS_CANCELED = 3;
  // Subscription failed.
  MCP_RESOURCE_SUBSCRIPTION_STATUS_FAILED = 4;
}

message Workspace {
  reserved 1000 to 1999;

  string workspace_id = 1;
  string computer_id = 2;
  string path = 3;
  string display_name = 4;
  repeated string aliases = 5;
  bool is_default = 6;
}
message RuntimeProfile {
  reserved 1000 to 1999;

  string runtime_profile_id = 1;
  // Open runtime adapter kind. Canonical values include codex, claude,
  // opencode, kimi, gemini, and custom runtime adapters.
  string kind = 2;
  // Open model provider name, such as openai, anthropic, google, or custom.
  string provider = 3;
  // Open model identifier; do not make this a closed enum.
  string model = 4;
  string adapter_config_json = 5;
  string workspace_id = 6;
  repeated EnvVar env = 7;
  repeated SkillRecord skills = 8;
  repeated Capability capabilities = 9;
}
message RuntimePreset {
  reserved 1000 to 1999;

  // Open runtime adapter kind. This is a catalog of known values, not a closed
  // enum; daemons and users may still report custom runtime kinds.
  string kind = 1;
  string display_name = 2;
  string provider = 3;
  string default_model = 4;
  string command = 5;
  repeated string aliases = 6;
  repeated string default_args = 7;
  repeated string env_var_names = 8;
  repeated string install_hint = 9;
  repeated Capability capabilities = 10;
  bool slock_supported = 11;
  bool multica_supported = 12;
  bool recommended = 13;
  string description = 14;
}
message ListRuntimePresetsRequest {
  bool include_experimental = 1;
  string kind_prefix = 2;
  uint32 limit = 3;
  EventCursor cursor = 4;
}
message ListRuntimePresetsResponse {
  repeated RuntimePreset presets = 1;
  EventCursor next_cursor = 2;
}
message Runtime {
  reserved 1000 to 1999;

  string runtime_id = 1;
  string computer_id = 2;
  string workspace_id = 3;
  // Open runtime adapter kind; use the same canonical values as RuntimeProfile.kind.
  string kind = 4;
  string display_name = 5;
  repeated string aliases = 6;
  string tool = 7;
  string command = 8;
  bool installed = 9;
  bool healthy = 10;
  bool supports_auto_install = 11;
  repeated string install_hint = 12;
  string config_dir = 13;
  uint32 current_task_count = 14;
  uint32 pending_task_count = 15;
  repeated Capability capabilities = 16;
  RuntimeProfile runtime_profile = 17;
}
message ComputerInventory {
  reserved 1000 to 1999;

  repeated Workspace workspaces = 1;
  repeated Runtime runtimes = 2;
  repeated AgentProfile agents = 3;
  repeated RuntimeProfile runtime_profiles = 4;
}
message ComputerInfo {
  reserved 1000 to 1999;

  string daemon_id = 1;
  string computer_id = 2;
  string display_name = 3;
  string hostname = 4;
  string os = 5;
  string arch = 6;
  string version = 7;
  ComputerStatus status = 8;
  int64 last_seen_unix = 9;
  string daemon_url = 10;
  string lease_id = 11;
  repeated Capability capabilities = 12;
}
message RegisterComputerRequest {
  ComputerInfo info = 1;
  ComputerInventory inventory = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}
message RegisterComputerResponse {
  bool accepted = 1;
  int64 server_time_unix = 2;
  Lease lease = 3;
}
message HeartbeatComputerRequest {
  ComputerInfo info = 1;
  // Optional full inventory snapshot. Servers must only apply it when
  // inventory_full_snapshot is true; otherwise omission means unchanged.
  ComputerInventory inventory = 2;
  string lease_id = 3;
  string request_id = 4;
  repeated AgentStatusSnapshot agent_statuses = 5;
  string idempotency_key = 6;
  RequestContext context = 7;
  string inventory_version = 8;
  bool inventory_full_snapshot = 9;
}
message HeartbeatComputerResponse {
  bool accepted = 1;
  int64 server_time_unix = 2;
  uint32 next_heartbeat_after_seconds = 3;
  Lease lease = 4;
}
message Run {
  reserved 1000 to 1999;
  reserved 17;
  reserved "status";

  string run_id = 1;
  string task_id = 2;
  string target = 3;
  string agent_id = 4;
  string computer_id = 5;
  string runtime_profile_id = 6;
  RunState state = 7;
  string lease_id = 8;
  string request_id = 9;
  string input_message_id = 10;
  string last_seen_event_id = 11;
  int64 started_time_unix = 12;
  int64 updated_time_unix = 13;
  int64 completed_time_unix = 14;
  string error = 15;
  string summary = 16;
  // 1 for the first attempt; incremented by server retry/recovery policy.
  uint32 attempt = 18;
  // Maximum attempts allowed by server retry/recovery policy.
  uint32 max_attempts = 19;
  // Parent run that this attempt retries or recovers from.
  string parent_run_id = 20;
  // Open failure taxonomy. Canonical values include agent_error, timeout,
  // runtime_offline, runtime_recovery, canceled, and manual.
  string failure_reason = 21;
  // Last daemon heartbeat/progress timestamp for this run.
  int64 last_heartbeat_time_unix = 22;
  // Server-generated launch prompt snapshot consumed by the daemon when
  // starting this run.
  string launch_prompt_snapshot_id = 23;
}
message LaunchPromptSnapshotSection {
  reserved 1000 to 1999;

  // Stable section name such as agent_identity, runtime_profile, run_context,
  // message_context, task_context, tools, or memory.
  string name = 1;
  // Server-side source for audit/debugging, such as agent_profile,
  // runtime_profile.adapter_config, run, message, task, or policy.
  string source = 2;
  // Redacted, runtime-safe text for this section.
  string content = 3;
  // True when the source was known to contain sensitive material or fields that
  // were omitted/redacted before inclusion.
  bool redacted = 4;
}
message LaunchPromptSnapshot {
  reserved 1000 to 1999;

  string snapshot_id = 1;
  string agent_id = 2;
  string computer_id = 3;
  string run_id = 4;
  string runtime_profile_id = 5;
  string target = 6;
  string thread_id = 7;
  string message_id = 8;
  string task_id = 9;
  string template_version = 10;
  // Runtime-safe prompt text assembled from sections and intended for adapter
  // system prompt injection. This must already be redacted.
  string content = 11;
  string content_hash = 12;
  repeated LaunchPromptSnapshotSection sections = 13;
  int64 created_time_unix = 14;
  string redaction_summary = 15;
  string source_version = 16;
}
message GetLaunchPromptSnapshotRequest {
  string run_id = 1;
  string agent_id = 2;
  string computer_id = 3;
  string runtime_profile_id = 4;
  string request_id = 5;
  RequestContext context = 6;
}
message GetLaunchPromptSnapshotResponse {
  LaunchPromptSnapshot snapshot = 1;
}
message RunStep {
  reserved 1000 to 1999;
  reserved 11;
  reserved "request_id";

  string step_id = 1;
  string run_id = 2;
  uint32 sequence = 3;
  RunStepKind kind = 4;
  RunStepStatus status = 5;
  string summary = 6;
  string detail = 7;
  repeated string artifact_ids = 8;
  int64 started_time_unix = 9;
  int64 completed_time_unix = 10;
}
message FetchAssignedRunsRequest {
  string computer_id = 1;
  repeated string agent_ids = 2;
  uint32 limit = 3;
  string request_id = 4;
  EventCursor cursor = 5;
}
message FetchAssignedRunsResponse {
  repeated Run runs = 1;
  EventCursor next_cursor = 2;
}
message UpdateRunStatusRequest {
  string run_id = 1;
  string agent_id = 2;
  RunState state = 3;
  string summary = 4;
  string error = 5;
  string blocked_reason = 6;
  string result_message = 7;
  string request_id = 8;
  string idempotency_key = 9;
  RequestContext context = 10;
  string lease_id = 11;
  // Optional structured final output produced by the agent. When present,
  // servers persist it with the task attempt record for audit and review.
  string result_json = 12;
  // Digest over result_json or another caller-defined canonical output.
  string result_digest = 13;
  // Agent-produced signature over result_digest or canonical output bytes.
  string result_signature = 14;
  // Public key that verifies result_signature. Servers may verify this once
  // agent identity records carry public keys.
  string signature_public_key = 15;
}
message UpdateRunStatusResponse {
  bool accepted = 1;
  string rejection_reason = 2;
  Run run = 3;
}
message RenewRunLeaseRequest {
  string run_id = 1;
  string lease_id = 2;
  string agent_id = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
  uint32 lease_ttl_seconds = 7;
}
message RenewRunLeaseResponse {
  bool accepted = 1;
  Run run = 2;
  Lease lease = 3;
  string rejection_reason = 4;
}
message AppendRunStepRequest {
  RunStep step = 1;
  string request_id = 2;
  string idempotency_key = 3;
  RequestContext context = 4;
  string lease_id = 5;
}
message AppendRunStepResponse {
  bool accepted = 1;
  RunStep step = 2;
  string rejection_reason = 3;
}
message ListRunsRequest {
  string target = 1;
  string task_id = 2;
  string agent_id = 3;
  uint32 limit = 4;
  EventCursor cursor = 5;
}
message ListRunsResponse {
  repeated Run runs = 1;
  EventCursor next_cursor = 2;
}
message GetRunRequest {
  string run_id = 1;
}
message GetRunResponse {
  Run run = 1;
  repeated RunStep steps = 2;
}
message WorkspaceTreeEntry {
  reserved 1000 to 1999;

  string path = 1;
  string name = 2;
  bool is_dir = 3;
  int64 size_bytes = 4;
  int64 modified_time_unix = 5;
}
message ListWorkspaceTreeRequest {
  string workspace_id = 1;
  // Path must resolve inside workspace_id after cleaning symlinks and "..".
  string path = 2;
  uint32 limit = 3;
  EventCursor cursor = 4;
}
message ListWorkspaceTreeResponse {
  string workspace_id = 1;
  string path = 2;
  repeated WorkspaceTreeEntry entries = 3;
  EventCursor next_cursor = 4;
}
message ReadWorkspaceFileRequest {
  string workspace_id = 1;
  // Path must resolve inside workspace_id after cleaning symlinks and "..".
  string path = 2;
  uint32 max_bytes = 3;
}
message ReadWorkspaceFileResponse {
  string workspace_id = 1;
  string path = 2;
  string content = 3;
  bool truncated = 4;
  int64 size_bytes = 5;
}
message McpResourceSubscription {
  reserved 1000 to 1999;

  string subscription_id = 1;
  string agent_id = 2;
  string runtime_id = 3;
  string endpoint_id = 4;
  string resource_uri = 5;
  McpResourceSubscriptionStatus status = 6;
  int64 created_time_unix = 7;
  string request_id = 8;
}
message McpResourceUpdate {
  reserved 1000 to 1999;

  string update_id = 1;
  string subscription_id = 2;
  string resource_uri = 3;
  string content_type = 4;
  string content = 5;
  bytes content_bytes = 6;
  int64 sequence = 7;
  int64 created_time_unix = 8;
}
message SubscribeMcpResourceRequest {
  McpResourceSubscription subscription = 1;
  string request_id = 2;
  string idempotency_key = 3;
  RequestContext context = 4;
}
message SubscribeMcpResourceResponse {
  McpResourceSubscription subscription = 1;
}
message CancelMcpResourceSubscriptionRequest {
  string subscription_id = 1;
  string agent_id = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}
message CancelMcpResourceSubscriptionResponse {
  bool accepted = 1;
  McpResourceSubscription subscription = 2;
}
message ListMcpResourceUpdatesRequest {
  reserved 3;
  reserved "from_sequence";

  string subscription_id = 1;
  string resource_uri = 2;
  uint32 limit = 4;
  EventCursor cursor = 5;
}
message ListMcpResourceUpdatesResponse {
  repeated McpResourceUpdate updates = 1;
  EventCursor next_cursor = 2;
}
message SyncComputerInventoryRequest {
  ComputerInfo info = 1;
  ComputerInventory inventory = 2;
  string inventory_version = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
}
message SyncComputerInventoryResponse {
  bool accepted = 1;
  string inventory_version = 2;
  int64 server_time_unix = 3;
}
message AcquireStartPermitRequest {
  string computer_id = 1;
  string agent_id = 2;
  string runtime_profile_id = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
  uint32 permit_ttl_seconds = 7;
}
message AcquireStartPermitResponse {
  bool granted = 1;
  Lease permit_lease = 2;
  string queued_operation_id = 3;
  uint32 retry_after_seconds = 4;
  string rejection_reason = 5;
}
message ReleaseStartPermitRequest {
  string lease_id = 1;
  string computer_id = 2;
  string agent_id = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
}
message ReleaseStartPermitResponse {
  bool accepted = 1;
}
