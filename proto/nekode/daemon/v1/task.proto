syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/common.proto";
import "nekode/daemon/v1/coordination.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

// TaskState is the closed task lifecycle used by task boards and agents.
// UNSPECIFIED is accepted only as an omitted filter/default, not as a stored state.
enum TaskState {
  // Default value for omitted filters or legacy unset records.
  TASK_STATE_UNSPECIFIED = 0;
  // Work is known but not yet actively owned.
  TASK_STATE_TODO = 1;
  // Work has been claimed or started.
  TASK_STATE_IN_PROGRESS = 2;
  // Work is ready for reviewer or human validation.
  TASK_STATE_IN_REVIEW = 3;
  // Work is completed and no further action is expected.
  TASK_STATE_DONE = 4;
  // Work is blocked on an external dependency or decision.
  TASK_STATE_BLOCKED = 5;
  // Work was intentionally canceled before completion.
  TASK_STATE_CANCELED = 6;
}

// TaskClaimPolicy defines whether and how a task can be claimed.
enum TaskClaimPolicy {
  // Use server default policy, normally EXCLUSIVE.
  TASK_CLAIM_POLICY_UNSPECIFIED = 0;
  // Only one owner may claim the task.
  TASK_CLAIM_POLICY_EXCLUSIVE = 1;
  // Multiple collaborators may be associated with the task.
  TASK_CLAIM_POLICY_SHARED = 2;
  // Only reviewer claims are permitted.
  TASK_CLAIM_POLICY_REVIEWER_ONLY = 3;
  // The task cannot be claimed directly.
  TASK_CLAIM_POLICY_UNCLAIMABLE = 4;
}

// TaskClaimConflictBehavior controls how the server responds to claim conflicts.
enum TaskClaimConflictBehavior {
  // Use server default behavior, normally FAIL_WITH_REASON for API clients.
  TASK_CLAIM_CONFLICT_BEHAVIOR_UNSPECIFIED = 0;
  // Return accepted=false without emitting user-visible chat noise.
  TASK_CLAIM_CONFLICT_BEHAVIOR_FAIL_SILENT = 1;
  // Return accepted=false with a structured conflict reason.
  TASK_CLAIM_CONFLICT_BEHAVIOR_FAIL_WITH_REASON = 2;
  // Queue the claimant for future ownership if supported.
  TASK_CLAIM_CONFLICT_BEHAVIOR_QUEUE = 3;
  // Treat the claimant as an assistant rather than primary owner.
  TASK_CLAIM_CONFLICT_BEHAVIOR_ASSIST = 4;
}

// TaskClaimMode describes the role requested by a claim operation.
enum TaskClaimMode {
  // Use server default claim mode, normally OWNER.
  TASK_CLAIM_MODE_UNSPECIFIED = 0;
  // Claim primary implementation ownership.
  TASK_CLAIM_MODE_OWNER = 1;
  // Claim reviewer responsibility.
  TASK_CLAIM_MODE_REVIEWER = 2;
  // Join as a helper without replacing the owner.
  TASK_CLAIM_MODE_ASSISTANT = 3;
}

// TaskEdgeKind is the closed taxonomy for task graph relationships.
enum TaskEdgeKind {
  // Unknown edge kind; should not be stored for new graph edges.
  TASK_EDGE_KIND_UNSPECIFIED = 0;
  // from_task depends on to_task.
  TASK_EDGE_KIND_DEPENDS_ON = 1;
  // from_task blocks to_task.
  TASK_EDGE_KIND_BLOCKS = 2;
  // from_task is the parent of to_task.
  TASK_EDGE_KIND_PARENT_CHILD = 3;
  // from_task duplicates to_task.
  TASK_EDGE_KIND_DUPLICATE_OF = 4;
}

// TaskSource records the closed set of built-in task creation sources.
// External import systems remain string-identified by server_rule_id or endpoint fields.
enum TaskSource {
  // Source is not known, usually for legacy records.
  TASK_SOURCE_UNSPECIFIED = 0;
  // Created directly by a human user.
  TASK_SOURCE_HUMAN = 1;
  // Created by an agent.
  TASK_SOURCE_AGENT = 2;
  // Created by a configured server rule.
  TASK_SOURCE_SERVER_RULE = 3;
  // Created by scheduler/reminder automation.
  TASK_SOURCE_SCHEDULER = 4;
  // Created by an import/migration job.
  TASK_SOURCE_IMPORT = 5;
}

message Task {
  reserved 1000 to 1999;
  reserved 15 to 17;
  reserved 33 to 36;
  reserved "subtask_ids", "depends_on_task_ids", "blocked_by_task_ids";
  reserved "released_time_unix", "release_version", "release_environment", "release_state";

  string task_id = 1;
  string summary = 2;
  TaskState state = 3;
  string runtime_id = 4;
  string thread_id = 5;
  string workspace_id = 6;
  string computer_id = 7;
  string created_by_user_id = 8;
  string blocked_reason = 9;
  string target = 10;
  string assignee_id = 11;
  string current_run_id = 12;

  // --- graph relationships ---
  string root_task_id = 13;
  string parent_task_id = 14;

  // --- provenance ---
  TaskSource source = 18;
  string created_by_agent_id = 19;
  string server_rule_id = 20;
  string split_proposal_id = 21;

  // --- graph versioning ---
  int64 graph_version = 22;

  // --- capability requirements ---
  repeated string required_capabilities = 23;

  // --- board projection ---
  // Open board column identifier. Canonical columns are todo, in_progress,
  // blocked, in_review, done, and canceled; custom board views may add columns
  // without changing the authoritative Task.state lifecycle.
  string board_column = 24;

  // --- collaboration ownership semantics ---
  TaskClaimPolicy claim_policy = 25;
  TaskClaimConflictBehavior claim_conflict_behavior = 26;
  int64 claimed_time_unix = 27;
  string claim_lease_id = 28;
  string reviewer_agent_id = 29;
  string release_gate_id = 30;
  string assigned_target = 31;
  int64 deadline_time_unix = 32;
  int64 created_time_unix = 37;
  int64 updated_time_unix = 38;
}
message CreateCollaborationTaskRequest {
  string target = 1;
  string summary = 2;
  string agent_id = 3;
  string created_by_user_id = 4;
  string request_id = 5;
  string idempotency_key = 6;
  RequestContext context = 7;
  optional string parent_task_id = 8;
  TaskClaimPolicy claim_policy = 9;
  repeated string required_capabilities = 10;
  int64 deadline_time_unix = 11;
  string assigned_target = 12;
  TaskClaimConflictBehavior claim_conflict_behavior = 13;
}
message CreateCollaborationTaskResponse {
  Task task = 1;
}
message GetTaskRequest {
  string task_id = 1;
}
message GetTaskResponse {
  Task task = 1;
}
message UpdateTaskRequest {
  string task_id = 1;
  optional string summary = 2;
  optional TaskState state = 3;
  optional int64 deadline_time_unix = 4;
  optional string board_column = 5;
  optional string assigned_target = 6;
  repeated string required_capabilities = 7;
  string request_id = 8;
  string idempotency_key = 9;
  RequestContext context = 10;
  int64 expected_updated_time_unix = 11;
}
message UpdateTaskResponse {
  bool accepted = 1;
  Task task = 2;
  string rejection_reason = 3;
}
message ListCollaborationTasksRequest {
  string target = 1;
  string agent_id = 2;
  uint32 limit = 3;
  EventCursor cursor = 4;
  repeated TaskState states = 5;
  string board_column = 6;
}
message ListCollaborationTasksResponse {
  repeated Task tasks = 1;
  EventCursor next_cursor = 2;
}
message TaskBoardColumn {
  // Open board column identifier; use the same canonical values as Task.board_column.
  string column = 1;
  repeated Task tasks = 2;
  int64 total_count = 3;
}
message TaskBoardSnapshot {
  repeated TaskBoardColumn columns = 1;
  map<string, int64> column_counts = 2;
  EventCursor next_cursor = 3;
}
message ListTaskBoardRequest {
  reserved 9;
  reserved "page_token";

  string target = 1;
  string assignee_id = 2;
  string created_by_user_id = 3;
  string created_by_agent_id = 4;
  // Open board column filter; use the same canonical values as Task.board_column.
  string column = 5;
  uint32 limit = 6;
  EventCursor cursor = 7;
  string request_id = 8;
}
message ListTaskBoardResponse {
  TaskBoardSnapshot board = 1;
}
message ClaimCollaborationTaskRequest {
  string task_id = 1;
  string agent_id = 2;
  string request_id = 3;
  string expected_assignee_id = 4;
  bool silent_on_conflict = 5;
  TaskClaimMode claim_mode = 6;
  string expected_lease_id = 7;
  string idempotency_key = 8;
  RequestContext context = 9;
  uint32 lease_ttl_seconds = 10;
}
message ClaimCollaborationTaskResponse {
  Task task = 1;
  bool accepted = 2;
  string conflict_reason = 3;
  string current_assignee_id = 4;
  TaskClaimConflictBehavior conflict_policy = 5;
  Lease claim_lease = 6;
  string current_lease_id = 7;
  int64 current_lease_expires_unix = 8;
}
message TaskEdge {
  string from_task_id = 1;
  string to_task_id = 2;
  TaskEdgeKind kind = 3;
}
message TaskGraphSnapshot {
  string root_task_id = 1;
  int64 graph_version = 2;
  repeated Task nodes = 3;
  repeated TaskEdge edges = 4;
}
message ProposedSubtask {
  string client_proposed_id = 1;
  string summary = 2;
  string assignee_id = 3;
  repeated string depends_on_proposed_ids = 4;
  repeated string required_capabilities = 5;
  string assigned_target = 6;
  string created_by_agent_id = 7;
  int64 deadline_time_unix = 8;
}
message ProposeTaskSplitRequest {
  string parent_task_id = 1;
  repeated ProposedSubtask proposed_tasks = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
  uint32 proposal_ttl_seconds = 6;
}
message ProposeTaskSplitResponse {
  string proposal_id = 1;
  Task parent_task = 2;
  repeated Task proposed_tasks = 3;
  bool accepted = 4;
  string rejection_reason = 5;
  int64 expires_time_unix = 6;
}
message ApplyTaskSplitRequest {
  string parent_task_id = 1;
  string proposal_id = 2;
  repeated string selected_task_ids = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
}
message ApplyTaskSplitResponse {
  Task parent_task = 1;
  repeated Task created_subtasks = 2;
  int64 new_graph_version = 3;
  bool accepted = 4;
  string rejection_reason = 5;
}
message CancelTaskSplitProposalRequest {
  string parent_task_id = 1;
  string proposal_id = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}
message CancelTaskSplitProposalResponse {
  bool accepted = 1;
}
message CreateTaskGraphRequest {
  Task root_task = 1;
  repeated Task subtasks = 2;
  repeated TaskEdge dependencies = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
}
message CreateTaskGraphResponse {
  TaskGraphSnapshot graph = 1;
}
message ListTaskGraphRequest {
  string root_task_id = 1;
  int64 since_graph_version = 2;
}
message ListTaskGraphResponse {
  TaskGraphSnapshot graph = 1;
}
message UpdateTaskGraphRequest {
  string task_id = 1;
  optional string new_assignee_id = 2;
  repeated TaskEdge add_dependencies = 3;
  repeated TaskEdge remove_dependencies = 4;
  optional string new_parent_task_id = 5;
  string request_id = 6;
  string idempotency_key = 7;
  RequestContext context = 8;
  int64 expected_graph_version = 9;
}
message UpdateTaskGraphResponse {
  Task task = 1;
  int64 new_graph_version = 2;
  bool accepted = 3;
  string rejection_reason = 4;
}
message RenewTaskClaimLeaseRequest {
  string task_id = 1;
  string lease_id = 2;
  string agent_id = 3;
  string request_id = 4;
  string idempotency_key = 5;
  RequestContext context = 6;
  uint32 lease_ttl_seconds = 7;
}
message RenewTaskClaimLeaseResponse {
  bool accepted = 1;
  Task task = 2;
  Lease lease = 3;
  string rejection_reason = 4;
}
message ReleaseTaskRequest {
  string task_id = 1;
  string release_gate_id = 2;
  string release_note = 3;
  string release_version = 4;
  string release_environment = 5;
  string request_id = 6;
  string idempotency_key = 7;
  RequestContext context = 8;
}
message ReleaseTaskResponse {
  Task task = 1;
  int64 released_time_unix = 2;
  ReleaseGate release_gate = 3;
}
