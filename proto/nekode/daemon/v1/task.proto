syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/common.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

message Task {
  string task_id = 1;
  string summary = 2;
  string state = 3;
  string runtime_id = 4;
  string thread_id = 5;
  string workspace_id = 6;
  string computer_id = 7;
  string created_by_user_id = 8;
  string blocked_reason = 9;
  string target = 10;
  string assignee_id = 11;
  string current_run_id = 12;

  // --- graph relationships ---
  string root_task_id = 13;
  string parent_task_id = 14;
  repeated string subtask_ids = 15;
  repeated string depends_on_task_ids = 16;
  repeated string blocked_by_task_ids = 17;

  // --- provenance ---
  string source = 18; // human | agent | server_rule | scheduler | import
  string created_by_agent_id = 19;
  string server_rule_id = 20;
  string split_proposal_id = 21;

  // --- graph versioning ---
  int64 graph_version = 22;

  // --- capability requirements ---
  repeated string required_capabilities = 23;

  // --- board projection ---
  string board_column = 24;

  // --- collaboration ownership semantics ---
  string claim_policy = 25; // exclusive | shared | reviewer_only | unclaimable
  string claim_conflict_behavior = 26; // fail_silent | fail_with_reason | queue | assist
  int64 claimed_time_unix = 27;
  string claim_lease_id = 28;
  string reviewer_agent_id = 29;
  string release_gate_id = 30;
}
message CreateCollaborationTaskRequest {
  string target = 1;
  string summary = 2;
  string agent_id = 3;
  string created_by_user_id = 4;
  string request_id = 5;
}
message CreateCollaborationTaskResponse {
  Task task = 1;
}
message ListCollaborationTasksRequest {
  string target = 1;
  string agent_id = 2;
  uint32 limit = 3;
}
message ListCollaborationTasksResponse {
  repeated Task tasks = 1;
}
message TaskBoardColumn {
  string column = 1;
  repeated Task tasks = 2;
  int64 total_count = 3;
}
message TaskBoardSnapshot {
  repeated TaskBoardColumn columns = 1;
  map<string, int64> counts = 2;
  EventCursor next_cursor = 3;
}
message ListTaskBoardRequest {
  string target = 1;
  string assignee_id = 2;
  string created_by_user_id = 3;
  string created_by_agent_id = 4;
  string column = 5;
  uint32 limit = 6;
  EventCursor cursor = 7;
}
message ListTaskBoardResponse {
  TaskBoardSnapshot board = 1;
}
message ClaimCollaborationTaskRequest {
  string task_id = 1;
  string agent_id = 2;
  string request_id = 3;
  string expected_assignee_id = 4;
  bool silent_on_conflict = 5;
  string claim_mode = 6; // owner | reviewer | assistant
  string lease_id = 7;
}
message ClaimCollaborationTaskResponse {
  Task task = 1;
  bool accepted = 2;
  string conflict_reason = 3;
  string current_assignee_id = 4;
  string conflict_policy = 5;
}
message TaskEdge {
  string from_task_id = 1;
  string to_task_id = 2;
  string kind = 3; // depends_on | blocks | parent_child
}
message TaskGraphSnapshot {
  string root_task_id = 1;
  int64 graph_version = 2;
  repeated Task nodes = 3;
  repeated TaskEdge edges = 4;
}
message ProposedSubtask {
  string client_proposed_id = 1;
  string summary = 2;
  string assignee_id = 3;
  repeated string depends_on_proposed_ids = 4;
  repeated string required_capabilities = 5;
}
message ProposeTaskSplitRequest {
  string parent_task_id = 1;
  repeated ProposedSubtask proposed_tasks = 2;
  string request_id = 3;
}
message ProposeTaskSplitResponse {
  string proposal_id = 1;
  Task parent_task = 2;
  repeated Task proposed_tasks = 3;
  bool accepted = 4;
  string rejection_reason = 5;
}
message ApplyTaskSplitRequest {
  string parent_task_id = 1;
  string proposal_id = 2;
  repeated string selected_task_ids = 3;
  string request_id = 4;
}
message ApplyTaskSplitResponse {
  Task parent_task = 1;
  repeated Task created_subtasks = 2;
  int64 new_graph_version = 3;
}
message CreateTaskGraphRequest {
  Task root_task = 1;
  repeated Task subtasks = 2;
  repeated TaskEdge dependencies = 3;
  string request_id = 4;
}
message CreateTaskGraphResponse {
  TaskGraphSnapshot graph = 1;
}
message ListTaskGraphRequest {
  string root_task_id = 1;
  int64 since_graph_version = 2;
}
message ListTaskGraphResponse {
  TaskGraphSnapshot graph = 1;
}
message UpdateTaskGraphRequest {
  string task_id = 1;
  optional string new_assignee_id = 2;
  repeated string add_dependencies = 3;
  repeated string remove_dependencies = 4;
  optional string new_parent_task_id = 5;
  string request_id = 6;
}
message UpdateTaskGraphResponse {
  Task task = 1;
  int64 new_graph_version = 2;
}
