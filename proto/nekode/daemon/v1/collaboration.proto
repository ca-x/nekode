syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/attachment.proto";
import "nekode/daemon/v1/common.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

// EndpointAuthMode is the closed set of transport auth modes Nekode understands.
// Endpoint kind/provider remain strings because integrations are open-ended.
enum EndpointAuthMode {
  // Auth mode is omitted or unknown; servers should reject new endpoints unless a default is configured.
  ENDPOINT_AUTH_MODE_UNSPECIFIED = 0;
  // Browser cookie authentication.
  ENDPOINT_AUTH_MODE_COOKIE = 1;
  // Bearer token authentication.
  ENDPOINT_AUTH_MODE_BEARER = 2;
  // Signed webhook requests.
  ENDPOINT_AUTH_MODE_WEBHOOK_SIGNATURE = 3;
  // MCP token authentication.
  ENDPOINT_AUTH_MODE_MCP_TOKEN = 4;
  // No authentication; use only for local or explicitly public endpoints.
  ENDPOINT_AUTH_MODE_NONE = 5;
}

// OutboundPolicy controls whether SendMessage also emits to external endpoints.
enum OutboundPolicy {
  // Use server default outbound policy, normally NONE for daemon-originated writes.
  OUTBOUND_POLICY_UNSPECIFIED = 0;
  // Do not emit to any external endpoint.
  OUTBOUND_POLICY_NONE = 1;
  // Emit only to the source endpoint if it supports outbound delivery.
  OUTBOUND_POLICY_SOURCE_ONLY = 2;
  // Emit to all bound endpoints for the target.
  OUTBOUND_POLICY_ALL_BOUND_ENDPOINTS = 3;
  // Emit to a server-selected subset supplied out of band.
  OUTBOUND_POLICY_SELECTED_ENDPOINTS = 4;
}

// OutboundDeliveryStatus is the closed lifecycle for webhook/IM delivery attempts.
enum OutboundDeliveryStatus {
  // Delivery status is omitted or unknown.
  OUTBOUND_DELIVERY_STATUS_UNSPECIFIED = 0;
  // Delivery is waiting to be attempted.
  OUTBOUND_DELIVERY_STATUS_PENDING = 1;
  // Delivery succeeded.
  OUTBOUND_DELIVERY_STATUS_DELIVERED = 2;
  // Delivery failed and is not currently retrying.
  OUTBOUND_DELIVERY_STATUS_FAILED = 3;
  // Delivery failed and is scheduled for retry.
  OUTBOUND_DELIVERY_STATUS_RETRYING = 4;
  // Delivery was canceled.
  OUTBOUND_DELIVERY_STATUS_CANCELED = 5;
}

// ChannelVisibility is the closed visibility/membership gate for a
// collaboration target. Private channel names, membership, and content must
// only be disclosed to authorized members.
enum ChannelVisibility {
  // Visibility is omitted or unknown.
  CHANNEL_VISIBILITY_UNSPECIFIED = 0;
  // Public channel visible to server members subject to normal permissions.
  CHANNEL_VISIBILITY_PUBLIC = 1;
  // Private channel; listing, members, and content require membership.
  CHANNEL_VISIBILITY_PRIVATE = 2;
}

// ChannelMemberRole is the closed set of built-in channel membership roles.
enum ChannelMemberRole {
  // Role is omitted or unknown.
  CHANNEL_MEMBER_ROLE_UNSPECIFIED = 0;
  // Regular member.
  CHANNEL_MEMBER_ROLE_MEMBER = 1;
  // Channel administrator/owner.
  CHANNEL_MEMBER_ROLE_ADMIN = 2;
  // Read-only observer.
  CHANNEL_MEMBER_ROLE_VIEWER = 3;
}

// MessageSearchSort controls the server-side search ordering.
enum MessageSearchSort {
  // Sort is omitted; servers should use relevance.
  MESSAGE_SEARCH_SORT_UNSPECIFIED = 0;
  // Best ranked match first.
  MESSAGE_SEARCH_SORT_RELEVANCE = 1;
  // Most recent matching message first.
  MESSAGE_SEARCH_SORT_RECENT = 2;
}

message ChannelRecord {
  reserved 1000 to 1999;

  string target = 1;
  string channel_id = 2;
  string display_name = 3;
  // Open channel taxonomy. Canonical values include channel, dm, thread,
  // external, and custom integration-specific names.
  string channel_type = 4;
  bool enabled = 5;
  string interaction_endpoint_id = 6;
  // Open source taxonomy that mirrors InteractionEndpoint.kind when known.
  string source_kind = 7;
  string external_id = 8;
  repeated Capability capabilities = 9;
  ChannelVisibility visibility = 10;
  bool joined = 11;
  uint32 member_count = 12;
}
message ChannelMemberRecord {
  reserved 1000 to 1999;

  string target = 1;
  Actor member = 2;
  ChannelMemberRole role = 3;
  int64 joined_time_unix = 4;
}
message InteractionEndpoint {
  reserved 1000 to 1999;

  string endpoint_id = 1;
  // Open endpoint taxonomy. Canonical values include web, cli, api, webhook,
  // mcp, im, and custom; providers may add new endpoint kinds.
  string kind = 2;
  // Open provider name. Canonical values include browser, mobile, wechat,
  // slack, openapi, and custom product/provider identifiers.
  string provider = 3;
  string display_name = 4;
  string target_prefix = 5;
  bool inbound_enabled = 6;
  bool outbound_enabled = 7;
  EndpointAuthMode auth_mode = 8;
  string config_json = 9; // non-secret endpoint configuration
  repeated Capability capabilities = 10;
}
message ListInteractionEndpointsRequest {
  uint32 limit = 1;
  EventCursor cursor = 2;
}
message ListInteractionEndpointsResponse {
  repeated InteractionEndpoint endpoints = 1;
  EventCursor next_cursor = 2;
}
message ListChannelsRequest {
  uint32 limit = 1;
  EventCursor cursor = 2;
  bool include_private = 3;
  bool joined_only = 4;
}
message ListChannelsResponse {
  repeated ChannelRecord channels = 1;
  EventCursor next_cursor = 2;
}
message ListChannelMembersRequest {
  string target = 1;
  uint32 limit = 2;
  EventCursor cursor = 3;
}
message ListChannelMembersResponse {
  repeated ChannelMemberRecord members = 1;
  EventCursor next_cursor = 2;
}
message ThreadRecord {
  reserved 1000 to 1999;

  string target = 1;
  string thread_id = 2;
  string topic = 3;
  string summary = 4;
  string runtime_id = 5;
  uint32 message_count = 6;
  int64 created_time_unix = 7;
  int64 updated_time_unix = 8;
  bool followed = 9;
}
message ListThreadsRequest {
  string target_prefix = 1;
  uint32 limit = 2;
  EventCursor cursor = 3;
}
message ListThreadsResponse {
  repeated ThreadRecord threads = 1;
  EventCursor next_cursor = 2;
}
message GetThreadRequest {
  string target = 1;
}
message GetThreadResponse {
  ThreadRecord thread = 1;
}
message CollaborationMessage {
  reserved 1000 to 1999;
  reserved 6, 7, 10;
  reserved "sender_agent_id", "sender_display_name", "sender_kind";

  string message_id = 1;
  string target = 2;
  string thread_id = 3;
  // Open rendering/model role. Canonical values include user, assistant,
  // system, tool, and custom runtime/provider roles.
  string role = 4;
  string content = 5;
  string reply_to_message_id = 8;
  int64 created_time_unix = 9;
  repeated AttachmentRecord attachments = 11;
  string request_id = 12;
  string source_endpoint_id = 13;
  string external_message_id = 14;
  string metadata_json = 15;
  string coordination_record_id = 16;
  string memory_record_id = 17;
  Actor sender = 18;
  int64 sequence = 19;
  string aggregate_id = 20;
}
message ReadMessagesRequest {
  reserved 4 to 6;
  reserved "page_token", "page_size", "after_sequence";

  string target = 1;
  uint32 limit = 2;
  EventCursor cursor = 3;
}
message ReadMessagesResponse {
  reserved 3;
  reserved "next_page_token";

  repeated CollaborationMessage messages = 1;
  EventCursor next_cursor = 2;
}
message SearchMessagesRequest {
  string query = 1;
  // Optional target scope. Empty means all visible targets for the caller.
  string target = 2;
  // Sender handle such as @alice. Raw internal ids must use sender instead.
  string sender_handle = 3;
  Actor sender = 4;
  MessageSearchSort sort = 5;
  uint32 limit = 6;
  EventCursor cursor = 7;
}
message SearchMessagesResponse {
  repeated CollaborationMessage messages = 1;
  EventCursor next_cursor = 2;
}
message SendMessageRequest {
  reserved 4, 5, 11;
  reserved "sender_agent_id", "sender_display_name", "sender_user_id";

  string target = 1;
  // Open rendering/model role; use the same canonical values as
  // CollaborationMessage.role. Defaults to user when omitted.
  string role = 2;
  string content = 3;
  string reply_to_message_id = 6;
  bool emit_outbound = 7;
  string request_id = 8;
  repeated string attachment_ids = 9;
  string source_endpoint_id = 10;
  string metadata_json = 12;
  string coordination_record_id = 13;
  string memory_record_id = 14;
  string idempotency_key = 15;
  RequestContext context = 16;
  OutboundPolicy outbound_policy = 17;
  Actor sender = 18;
}
message SendMessageResponse {
  bool accepted = 1;
  CollaborationMessage message = 2;
}
message SavedMessageRecord {
  string saved_message_id = 1;
  string target = 2;
  string thread_id = 3;
  string message_id = 4;
  string saved_by_agent_id = 5;
  string saved_by_user_id = 6;
  int64 saved_time_unix = 7;
  CollaborationMessage message = 8;
}
message SaveMessageRequest {
  string target = 1;
  string message_id = 2;
  string saved_by_agent_id = 3;
  string saved_by_user_id = 4;
  string request_id = 5;
  string idempotency_key = 6;
  RequestContext context = 7;
}
message SaveMessageResponse {
  bool saved = 1;
  SavedMessageRecord saved_message = 2;
}
message UnsaveMessageRequest {
  string target = 1;
  string message_id = 2;
  string saved_by_agent_id = 3;
  string saved_by_user_id = 4;
  string request_id = 5;
  string idempotency_key = 6;
  RequestContext context = 7;
}
message UnsaveMessageResponse {
  bool removed = 1;
  SavedMessageRecord saved_message = 2;
}
message ListSavedMessagesRequest {
  string target = 1;
  string saved_by_agent_id = 2;
  string saved_by_user_id = 3;
  uint32 limit = 4;
  EventCursor cursor = 5;
}
message ListSavedMessagesResponse {
  repeated SavedMessageRecord saved_messages = 1;
  EventCursor next_cursor = 2;
}
message FollowThreadRequest {
  string target = 1;
  string agent_id = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}
message FollowThreadResponse {
  bool accepted = 1;
}
message UnfollowThreadRequest {
  string target = 1;
  string agent_id = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}
message UnfollowThreadResponse {
  bool accepted = 1;
}
message OutboundDeliveryRecord {
  reserved 1000 to 1999;

  string delivery_id = 1;
  string target = 2;
  string message_id = 3;
  string endpoint_id = 4;
  // Open endpoint taxonomy copied from InteractionEndpoint.kind at delivery time.
  // Canonical values include webhook, im, mcp, api, and custom.
  string endpoint_kind = 5;
  string external_message_id = 6;
  OutboundDeliveryStatus status = 7;
  uint32 attempt_count = 8;
  int64 next_retry_time_unix = 9;
  int64 delivered_time_unix = 10;
  string last_error = 11;
  string request_id = 12;
}
message ListOutboundDeliveriesRequest {
  string target = 1;
  string message_id = 2;
  string endpoint_id = 3;
  repeated OutboundDeliveryStatus statuses = 4;
  uint32 limit = 5;
  EventCursor cursor = 6;
}
message ListOutboundDeliveriesResponse {
  repeated OutboundDeliveryRecord deliveries = 1;
  EventCursor next_cursor = 2;
}
message RetryOutboundDeliveryRequest {
  string delivery_id = 1;
  string request_id = 2;
  string idempotency_key = 3;
  RequestContext context = 4;
}
message RetryOutboundDeliveryResponse {
  OutboundDeliveryRecord delivery = 1;
}
