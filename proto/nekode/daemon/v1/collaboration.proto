syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/attachment.proto";
import "nekode/daemon/v1/common.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

message ChannelRecord {
  string target = 1;
  string channel_id = 2;
  string display_name = 3;
  string channel_type = 4;
  bool enabled = 5;
  string interaction_endpoint_id = 6;
  string source_kind = 7;
  string external_id = 8;
  repeated Capability capabilities = 9;
}
message InteractionEndpoint {
  string endpoint_id = 1;
  string kind = 2; // web | cli | api | webhook | mcp | im | custom
  string provider = 3; // browser | mobile | wechat | slack | openapi | custom
  string display_name = 4;
  string target_prefix = 5;
  bool inbound_enabled = 6;
  bool outbound_enabled = 7;
  string auth_mode = 8; // cookie | bearer | webhook_signature | mcp_token | none
  string config_json = 9; // non-secret endpoint configuration
  repeated Capability capabilities = 10;
}
message ListInteractionEndpointsRequest {
  uint32 limit = 1;
}
message ListInteractionEndpointsResponse {
  repeated InteractionEndpoint endpoints = 1;
}
message ListChannelsRequest {
  uint32 limit = 1;
}
message ListChannelsResponse {
  repeated ChannelRecord channels = 1;
}
message ThreadRecord {
  string target = 1;
  string thread_id = 2;
  string topic = 3;
  string summary = 4;
  string runtime_id = 5;
  uint32 message_count = 6;
  int64 created_time_unix = 7;
  int64 updated_time_unix = 8;
  bool followed = 9;
}
message ListThreadsRequest {
  string target_prefix = 1;
  uint32 limit = 2;
}
message ListThreadsResponse {
  repeated ThreadRecord threads = 1;
}
message GetThreadRequest {
  string target = 1;
}
message GetThreadResponse {
  ThreadRecord thread = 1;
}
message CollaborationMessage {
  string message_id = 1;
  string target = 2;
  string thread_id = 3;
  string role = 4;
  string content = 5;
  string sender_agent_id = 6;
  string sender_display_name = 7;
  string reply_to_message_id = 8;
  int64 created_time_unix = 9;
  string sender_kind = 10;
  repeated AttachmentRecord attachments = 11;
  string request_id = 12;
  string source_endpoint_id = 13;
  string external_message_id = 14;
  string metadata_json = 15;
  string coordination_record_id = 16;
  string memory_record_id = 17;
}
message ReadMessagesRequest {
  string target = 1;
  uint32 limit = 2;
}
message ReadMessagesResponse {
  repeated CollaborationMessage messages = 1;
}
message SendMessageRequest {
  string target = 1;
  string role = 2;
  string content = 3;
  string sender_agent_id = 4;
  string sender_display_name = 5;
  string reply_to_message_id = 6;
  bool emit_outbound = 7;
  string request_id = 8;
  repeated string attachment_ids = 9;
  string source_endpoint_id = 10;
  string sender_user_id = 11;
  string metadata_json = 12;
  string coordination_record_id = 13;
  string memory_record_id = 14;
}
message SendMessageResponse {
  bool accepted = 1;
  CollaborationMessage message = 2;
}
message SavedMessageRecord {
  string saved_message_id = 1;
  string target = 2;
  string thread_id = 3;
  string message_id = 4;
  string saved_by_agent_id = 5;
  string saved_by_user_id = 6;
  int64 saved_time_unix = 7;
  CollaborationMessage message = 8;
}
message SaveMessageRequest {
  string target = 1;
  string message_id = 2;
  string saved_by_agent_id = 3;
  string saved_by_user_id = 4;
  string request_id = 5;
}
message SaveMessageResponse {
  bool saved = 1;
  SavedMessageRecord saved_message = 2;
}
message UnsaveMessageRequest {
  string target = 1;
  string message_id = 2;
  string saved_by_agent_id = 3;
  string saved_by_user_id = 4;
  string request_id = 5;
}
message UnsaveMessageResponse {
  bool removed = 1;
  SavedMessageRecord saved_message = 2;
}
message ListSavedMessagesRequest {
  string target = 1;
  string saved_by_agent_id = 2;
  string saved_by_user_id = 3;
  uint32 limit = 4;
}
message ListSavedMessagesResponse {
  repeated SavedMessageRecord saved_messages = 1;
}
message FollowThreadRequest {
  string target = 1;
  string agent_id = 2;
  string request_id = 3;
}
message FollowThreadResponse {
  bool accepted = 1;
}
message UnfollowThreadRequest {
  string target = 1;
  string agent_id = 2;
  string request_id = 3;
}
message UnfollowThreadResponse {
  bool accepted = 1;
}
