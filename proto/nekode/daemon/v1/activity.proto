syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/collaboration.proto";
import "nekode/daemon/v1/common.proto";
import "nekode/daemon/v1/coordination.proto";
import "nekode/daemon/v1/memory.proto";
import "nekode/daemon/v1/reminder.proto";
import "nekode/daemon/v1/runtime.proto";
import "nekode/daemon/v1/task.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

message ActivityRecord {
  reserved 1000 to 1999;

  string activity_id = 1;
  string target = 2;
  string agent_id = 3;
  string kind = 4;
  string summary = 5;
  string detail = 6;
  int64 created_time_unix = 7;
  string run_id = 8;
  string step_id = 9;
  string coordination_record_id = 10;
  string memory_record_id = 11;
  int64 sequence = 12;
  string aggregate_id = 13;
  int32 protocol_version = 14;
}
message LogActivityRequest {
  string target = 1;
  string agent_id = 2;
  string kind = 3;
  string summary = 4;
  string detail = 5;
  string run_id = 6;
  string step_id = 7;
  string request_id = 8;
  string idempotency_key = 9;
  RequestContext context = 10;
}
message LogActivityResponse {
  ActivityRecord activity = 1;
}
message ListActivityRequest {
  reserved 5 to 7;
  reserved "from_sequence", "aggregate_id", "page_token";

  string target = 1;
  string agent_id = 2;
  uint32 limit = 3;
  EventCursor cursor = 4;
}
message ListActivityResponse {
  reserved 3;
  reserved "next_page_token";

  repeated ActivityRecord activities = 1;
  EventCursor next_cursor = 2;
}
message ListEventsSinceRequest {
  reserved 3 to 5;
  reserved "from_sequence", "aggregate_id", "page_token";

  EventCursor cursor = 1;
  uint32 limit = 2;
}
message CollaborationEvent {
  reserved 1000 to 1999;

  string event_id = 1;
  string target = 2;
  string kind = 3;
  string message_id = 4;
  string activity_id = 5;
  string task_id = 6;
  string run_id = 7;
  int64 created_time_unix = 8;
  string attachment_id = 9;
  string coordination_record_id = 10;
  string memory_record_id = 11;
  int64 sequence = 12;
  string aggregate_id = 13;
  int32 protocol_version = 14;
  string source_endpoint_id = 15;

  oneof payload {
    CollaborationMessage message = 20;
    ActivityRecord activity = 21;
    Task task = 22;
    ReminderRecord reminder = 23;
    CoordinationRecord coordination_record = 24;
    MemoryRecord memory_record = 25;
    Run run = 26;
    RunStep run_step = 27;
  }
}
message ListEventsSinceResponse {
  reserved 3;
  reserved "next_page_token";

  repeated CollaborationEvent events = 1;
  EventCursor next_cursor = 2;
}
message SubscribeActivityRequest {
  reserved 2, 3;
  reserved "from_sequence", "aggregate_id";

  EventCursor cursor = 1;
  repeated string targets = 4;
  string request_id = 5;
}

message AcknowledgeActivityEventsRequest {
  repeated string event_ids = 1;
  EventCursor cursor = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}

message AcknowledgeActivityEventsResponse {
  bool accepted = 1;
  EventCursor cursor = 2;
}
