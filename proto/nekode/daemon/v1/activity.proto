syntax = "proto3";

package nekode.daemon.v1;

import "nekode/daemon/v1/collaboration.proto";
import "nekode/daemon/v1/common.proto";
import "nekode/daemon/v1/coordination.proto";
import "nekode/daemon/v1/memory.proto";
import "nekode/daemon/v1/reminder.proto";
import "nekode/daemon/v1/runtime.proto";
import "nekode/daemon/v1/task.proto";

option go_package = "github.com/ca-x/nekode/gen/go/nekode/daemon/v1;daemonv1";

// CollaborationEventKind is the closed routing taxonomy for replay/subscribe
// events visible to collaboration clients. The oneof payload is authoritative;
// kind is a routing hint and must match the payload type when set.
enum CollaborationEventKind {
  // Event kind is omitted or unknown.
  COLLABORATION_EVENT_KIND_UNSPECIFIED = 0;
  // A collaboration message changed.
  COLLABORATION_EVENT_KIND_MESSAGE = 1;
  // An activity record was logged.
  COLLABORATION_EVENT_KIND_ACTIVITY = 2;
  // A task changed.
  COLLABORATION_EVENT_KIND_TASK = 3;
  // A reminder changed or fired.
  COLLABORATION_EVENT_KIND_REMINDER = 4;
  // A coordination record changed.
  COLLABORATION_EVENT_KIND_COORDINATION = 5;
  // A server-visible memory record changed.
  COLLABORATION_EVENT_KIND_MEMORY = 6;
  // A run changed.
  COLLABORATION_EVENT_KIND_RUN = 7;
  // A run step changed.
  COLLABORATION_EVENT_KIND_RUN_STEP = 8;
  // An attachment changed; attachment_id identifies the attachment.
  COLLABORATION_EVENT_KIND_ATTACHMENT = 9;
  // Keepalive ping for long-lived subscriptions.
  COLLABORATION_EVENT_KIND_PING = 10;
}

message ActivityRecord {
  reserved 1000 to 1999;

  string activity_id = 1;
  string target = 2;
  string agent_id = 3;
  // Open activity taxonomy. Canonical values include message_received,
  // task_claimed, command_run, test_run, review_completed, memory_updated, and
  // custom integration-specific names.
  string kind = 4;
  string summary = 5;
  string detail = 6;
  int64 created_time_unix = 7;
  string run_id = 8;
  string step_id = 9;
  string coordination_record_id = 10;
  string memory_record_id = 11;
  int64 sequence = 12;
  string aggregate_id = 13;
  int32 protocol_version = 14;
}
message LogActivityRequest {
  string target = 1;
  string agent_id = 2;
  // Open activity taxonomy; use the same canonical values as ActivityRecord.kind.
  string kind = 3;
  string summary = 4;
  string detail = 5;
  string run_id = 6;
  string step_id = 7;
  string request_id = 8;
  string idempotency_key = 9;
  RequestContext context = 10;
}
message LogActivityResponse {
  ActivityRecord activity = 1;
}
message ListActivityRequest {
  reserved 5 to 7;
  reserved "from_sequence", "aggregate_id", "page_token";

  string target = 1;
  string agent_id = 2;
  uint32 limit = 3;
  EventCursor cursor = 4;
}
message ListActivityResponse {
  reserved 3;
  reserved "next_page_token";

  repeated ActivityRecord activities = 1;
  EventCursor next_cursor = 2;
}
message ListEventsSinceRequest {
  reserved 3 to 5;
  reserved "from_sequence", "aggregate_id", "page_token";

  EventCursor cursor = 1;
  uint32 limit = 2;
  // Optional scope filters. Empty means server default visibility for caller.
  repeated EventScope scopes = 6;
  // Optional kind filters for clients that only need a subset of the stream.
  repeated CollaborationEventKind kinds = 7;
  // Optional operation filters for cache/projection subscribers.
  repeated EventOperation operations = 8;
}
message CollaborationEvent {
  reserved 1000 to 1999;

  string event_id = 1;
  string target = 2;
  CollaborationEventKind kind = 3;
  string message_id = 4;
  string activity_id = 5;
  string task_id = 6;
  string run_id = 7;
  int64 created_time_unix = 8;
  string attachment_id = 9;
  string coordination_record_id = 10;
  string memory_record_id = 11;
  int64 sequence = 12;
  string aggregate_id = 13;
  int32 protocol_version = 14;
  string source_endpoint_id = 15;
  // Fine-grained change verb for cache invalidation and UI routing.
  EventOperation operation = 16;
  // Primary fanout/projection scope for this event.
  EventScope scope = 17;
  // Workspace id when the event belongs to a workspace-bound projection.
  string workspace_id = 18;

  oneof payload {
    CollaborationMessage message = 20;
    ActivityRecord activity = 21;
    Task task = 22;
    ReminderRecord reminder = 23;
    CoordinationRecord coordination_record = 24;
    MemoryRecord memory_record = 25;
    Run run = 26;
    RunStep run_step = 27;
  }
}
message ListEventsSinceResponse {
  reserved 3;
  reserved "next_page_token";

  repeated CollaborationEvent events = 1;
  EventCursor next_cursor = 2;
}
message SubscribeActivityRequest {
  reserved 2, 3;
  reserved "from_sequence", "aggregate_id";

  EventCursor cursor = 1;
  repeated string targets = 4;
  string request_id = 5;
  // Optional scope subscriptions. Empty keeps legacy target/caller-scoped behavior.
  repeated EventScope scopes = 6;
  // Optional event kind filters.
  repeated CollaborationEventKind kinds = 7;
  // Optional operation filters.
  repeated EventOperation operations = 8;
  // Explicitly request all visible scopes for the caller. Servers may reject
  // this for unprivileged clients.
  bool include_all_scopes = 9;
}

message AcknowledgeActivityEventsRequest {
  repeated string event_ids = 1;
  EventCursor cursor = 2;
  string request_id = 3;
  string idempotency_key = 4;
  RequestContext context = 5;
}

message AcknowledgeActivityEventsResponse {
  bool accepted = 1;
  EventCursor cursor = 2;
}
